// DNF 2001 PS Vita - Optimized FPS Controls
// These settings are baked into the source via patch_controls.py
// This file serves as a runtime override/reference

// =========================================
// JOYSTICK AXIS MAPPING (Analog Sticks)
// =========================================
// Axis functions: analog_turning=0, analog_strafing=1,
//                 analog_lookingupanddown=2, analog_moving=5
// Vita axes: 0=LStickX, 1=LStickY, 2=RStickX, 3=RStickY

// Left Stick X = Strafe left/right
JoystickAnalogAxes0 "analog_strafing"

// Left Stick Y = Move forward/back
JoystickAnalogAxes1 "analog_moving"

// Right Stick X = Turn/Aim left/right
JoystickAnalogAxes2 "analog_turning"

// Right Stick Y = Look up/down
JoystickAnalogAxes3 "analog_lookingupanddown"

// =========================================
// AXIS SENSITIVITY
// =========================================
// Default scale is 65536 (NORMALAXISSCALE)
JoystickAnalogScale0 65536
JoystickAnalogScale1 65536
JoystickAnalogScale2 65536
JoystickAnalogScale3 65536

// =========================================
// DEADZONE (prevent stick drift)
// =========================================
JoystickAnalogDead0 1000
JoystickAnalogSaturate0 9500
JoystickAnalogDead1 1000
JoystickAnalogSaturate1 9500
JoystickAnalogDead2 1000
JoystickAnalogSaturate2 9500
JoystickAnalogDead3 1000
JoystickAnalogSaturate3 9500

// =========================================
// No digital functions on analog axes
// =========================================
JoystickDigitalAxes0_0 ""
JoystickDigitalAxes0_1 ""
JoystickDigitalAxes1_0 ""
JoystickDigitalAxes1_1 ""
JoystickDigitalAxes2_0 ""
JoystickDigitalAxes2_1 ""
JoystickDigitalAxes3_0 ""
JoystickDigitalAxes3_1 ""

// =========================================
// BUTTON BINDINGS
// =========================================
// Vita SDL: 0=Triangle 1=Circle 2=Cross 3=Square 4=L 5=R
//           6-9=DPad(mapped as hat buttons)

unbindall

// R trigger = Fire
bind "Joy5" "gamefunc_Fire"

// L trigger = Open/Use
bind "Joy4" "gamefunc_Open"

// Cross = Jump
bind "Joy2" "gamefunc_Jump"

// Square = Crouch
bind "Joy3" "gamefunc_Crouch"

// Circle = Quick Kick
bind "Joy1" "gamefunc_Quick_Kick"

// Triangle = Previous Weapon
bind "Joy0" "gamefunc_Previous_Weapon"

// D-Pad Up = Next Weapon
bind "Joy6" "gamefunc_Next_Weapon"

// D-Pad Down = Inventory
bind "Joy7" "gamefunc_Inventory"

// Start = Map
bind "Joy9" "gamefunc_Map"

// Select = Third person
bind "Joy8" "gamefunc_Third_Person_View"

// =========================================
// AIMING
// =========================================
in_aimmode 1
in_mousemode 0
